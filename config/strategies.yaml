strategies:
- class: strategy.examples.dynamic_grid.DynamicGridStrategy
  enabled: true
  name: DynamicGrid_BTC
  params:
    grid_range_pct: 3.0
    leverage: 3
    min_spread_pct: 0.2
    num_levels: 5
    qty_per_level: 0.001
    rebalance_interval_bars: 16
    symbols:
    - BTC/USDT
    timeframes:
    - 15m
- class: strategy.examples.dynamic_grid.DynamicGridStrategy
  enabled: true
  name: DynamicGrid_ETH
  params:
    grid_range_pct: 4.0
    leverage: 3
    min_spread_pct: 0.2
    num_levels: 5
    qty_per_level: 0.01
    rebalance_interval_bars: 16
    symbols:
    - ETH/USDT
    timeframes:
    - 15m
- class: ml_alpha.strategy.MLAlphaStrategy
  enabled: false
  name: MLAlpha_BTC
  params:
    confidence_threshold: 0.6
    model_path: ml_alpha/model.pkl
    symbols:
    - BTC/USDT
    timeframes:
    - 1h
- class: strategy.examples.ma_cross.MACrossoverStrategy
  enabled: false
  name: MA_Cross_BTC
  params:
    atr_period: 14
    atr_sl_mult: 2.0
    atr_tp_mult: 4.0
    cooldown_bars: 5
    fast_period: 5
    leverage: 5
    slow_period: 20
    symbols:
