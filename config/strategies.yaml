strategies:
- name: DynamicGrid_BTC
  class: strategy.examples.dynamic_grid.DynamicGridStrategy
  enabled: false
  params:
    symbols:
    - BTC/USDT
    timeframes:
    - 15m
    grid_range_pct: 3.0
    num_levels: 5
    qty_per_level: 0.001
    rebalance_interval_bars: 16
    min_spread_pct: 0.2
    leverage: 3
- name: DynamicGrid_ETH
  class: strategy.examples.dynamic_grid.DynamicGridStrategy
  enabled: false
  params:
    symbols:
    - ETH/USDT
    timeframes:
    - 15m
    grid_range_pct: 4.0
    num_levels: 5
    qty_per_level: 0.01
    rebalance_interval_bars: 16
    min_spread_pct: 0.2
    leverage: 3
- name: MLAlpha_BTC
  class: ml_alpha.strategy.MLAlphaStrategy
  enabled: false
  params:
    model_path: ml_alpha/model.pkl
    symbols:
    - BTC/USDT
    timeframes:
    - 1h
    confidence_threshold: 0.55
- name: MA_Cross_BTC
  class: strategy.examples.ma_cross.MACrossoverStrategy
  enabled: false
  params:
    symbols:
    - BTC/USDT
    timeframes:
    - 1h
    fast_period: 5
    slow_period: 20
    atr_period: 14
    atr_sl_mult: 2.0
    atr_tp_mult: 4.0
    cooldown_bars: 5
    leverage: 5
- name: MA_Cross_ETH
  class: strategy.examples.ma_cross.MACrossoverStrategy
  enabled: false
  params:
    symbols:
    - ETH/USDT
    timeframes:
    - 1h
    fast_period: 5
    slow_period: 13
    atr_period: 14
    atr_sl_mult: 2.0
    atr_tp_mult: 3.0
    cooldown_bars: 5
    leverage: 5
- name: TrendFollow_BTC
  class: strategy.examples.trend_follow.TrendFollow
  enabled: true
  params:
    symbols:
    - BTC/USDT
    timeframes:
    - 15m
    ema_period: 75
    stop_loss_pct: 0.01
    take_profit_pct: 0.015
    cooldown_bars: 10
    leverage: 3
- name: TrendFollow_ETH
  class: strategy.examples.trend_follow.TrendFollow
  enabled: false
  params:
    symbols:
    - ETH/USDT
    timeframes:
    - 1h
    ema_period: 50
    stop_loss_pct: 0.03
    take_profit_pct: 0.06
    cooldown_bars: 8
    leverage: 3
- name: RSI_MR_BTC
  class: strategy.examples.rsi_mean_reversion.RSIMeanReversionStrategy
  enabled: false
  params:
    symbols:
    - BTC/USDT
    timeframes:
    - 1h
    rsi_period: 14
    oversold: 30
    overbought: 70
    exit_rsi: 50
    stop_loss_pct: 0.03
    take_profit_pct: 0.06
    cooldown_bars: 5
    leverage: 3
- name: RSI_MR_ETH
  class: strategy.examples.rsi_mean_reversion.RSIMeanReversionStrategy
  enabled: false
  params:
    symbols:
    - ETH/USDT
    timeframes:
    - 1h
    rsi_period: 14
    oversold: 20
    overbought: 80
    exit_rsi: 50
    stop_loss_pct: 0.02
    take_profit_pct: 0.04
    cooldown_bars: 5
    leverage: 3
- name: TrendFollow_BTC_1h
  class: strategy.examples.trend_follow.TrendFollow
  enabled: false
  params:
    symbols:
    - BTC/USDT
    timeframes:
    - 1h
    ema_period: 50
    stop_loss_pct: 0.015
    take_profit_pct: 0.05
    cooldown_bars: 8
    leverage: 3
